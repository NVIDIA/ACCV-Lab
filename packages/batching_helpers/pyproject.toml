[build-system]
requires = [
    "setuptools>=64",
    "wheel",
    "ninja",
    "torch>=2.0.0",
    "setuptools-scm>=8",
    "accvlab-build-config @ file:../../build_config",
]
build-backend = "setuptools.build_meta"

[project]
name = "accvlab.batching_helpers"
dynamic = ["version"]
description = "Batching Helpers Package (part of the ACCV-Lab package)."
requires-python = ">=3.8"
dependencies = [
    "torch>=2.0.0",
    "numpy>=1.22.2",
]

[project.optional-dependencies]
optional = [
    "pytest",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["accvlab.batching_helpers*"]

[tool.setuptools_scm]
version_scheme = "no-guess-dev"
fallback_version = "0.0.0"
root = "../.."
