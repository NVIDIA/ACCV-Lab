[build-system]
requires = ["setuptools>=61.0", "wheel", "torch>=2.0.0", "ninja", "setuptools-scm>=8"]
build-backend = "setuptools.build_meta"

[project]
name = "accvlab.draw_heatmap"
dynamic = ["version"]
description = "Draw Heatmap Package (part of the ACCV-Lab package)."
requires-python = ">=3.8"
dependencies = [
    "torch>=2.0.0",
    "accvlab.batching_helpers>=0.0.0",
    "accvlab-build-config>=0.0.0",
]

[project.optional-dependencies]
optional = [
    "pytest",
    "shapely",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["accvlab.draw_heatmap*"]

[tool.setuptools_scm]
version_scheme = "no-guess-dev"
fallback_version = "0.0.0"
root = "../.."
