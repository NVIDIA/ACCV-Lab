[build-system]
requires = [
    "setuptools>=64",
    "wheel",
    "scikit-build>=0.17.0",
    "pybind11>=2.10.0",
    "setuptools-scm>=8",
    "accvlab-build-config @ file:../../build_config",
]
build-backend = "setuptools.build_meta"

[project]
name = "accvlab.example_skbuild_package"
dynamic = ["version"]
description = "ACCV-Lab SKBuild Example Package"
requires-python = ">=3.8"
dependencies = [
    "torch>=2.0.0",
    "numpy>=1.22.2",
]

[project.optional-dependencies]
optional = [
    "pytest",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["accvlab.example_skbuild_package*"]

[tool.setuptools_scm]
version_scheme = "no-guess-dev"
fallback_version = "0.0.0"
root = "../.."
