[build-system]
requires = [
    "setuptools>=64",
    "wheel",
    "torch>=2.0.0",
    "setuptools-scm>=8",
]
build-backend = "setuptools.build_meta"

[project]
name = "accvlab.multi_tensor_copier"
dynamic = ["version"]
description = "Async copying of nested tensor structures (ACCV-Lab)."
requires-python = ">=3.8"
dependencies = [
    "torch>=2.0.0",
    "numpy>=1.22.2",
    "accvlab-build-config>=0.0.0",
]

[project.optional-dependencies]
optional = [
    "pytest",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["accvlab.multi_tensor_copier*"]

[tool.setuptools_scm]
version_scheme = "no-guess-dev"
fallback_version = "0.0.0"
root = "../.."
